version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: khanabazaar-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: khanabazaar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: khanabazaar-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: khanabazaar-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-dev-master-key-change-me}"
      MEILI_ENV: "development"
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  meilisearch-test:
    image: getmeili/meilisearch:v1.11
    container_name: khanabazaar-meilisearch-test
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: "test-master-key"
      MEILI_ENV: "development"
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7701:7700"
    profiles: ["test"]

volumes:
  postgres_data:
  redis_data:
  meili_data:
