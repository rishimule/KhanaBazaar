name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Serialize deploys: back-to-back merges queue instead of racing on Cloud Run
# updates (which otherwise hit "ABORTED: Conflict"). Never cancel an in-flight
# deploy partway — let it finish, then run the next.
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  AR_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev
  ZONE: ${{ vars.GCP_ZONE }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Deploys run ~6 min; cap the run so a hung deploy can't hold the
    # `deploy-main` concurrency lane (default is GitHub's 6-hour timeout).
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: gh-deployer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker $AR_HOST --quiet

      - name: Build & push api image
        run: |
          IMG=$AR_HOST/$PROJECT_ID/kb/api:${{ github.sha }}
          docker build -t $IMG -t $AR_HOST/$PROJECT_ID/kb/api:latest -f backend/app/Dockerfile backend/app
          docker push $IMG
          docker push $AR_HOST/$PROJECT_ID/kb/api:latest
          echo "API_IMAGE=$IMG" >> $GITHUB_ENV

      - name: Build & push web image
        run: |
          IMG=$AR_HOST/$PROJECT_ID/kb/web:${{ github.sha }}
          docker build -t $IMG \
            --build-arg NEXT_PUBLIC_API_URL="" \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY="${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY }}" \
            --build-arg NEXT_PUBLIC_VAPID_PUBLIC_KEY="${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}" \
            --build-arg INTERNAL_API_URL="${{ vars.INTERNAL_API_URL }}" \
            -f frontend/Dockerfile frontend
          docker push $IMG
          echo "WEB_IMAGE=$IMG" >> $GITHUB_ENV

      - name: Migrate + seed (Cloud Run Job)
        run: |
          gcloud run jobs update kb-migrate --region=$REGION --image=$API_IMAGE \
            --command=bash --args=scripts/deploy_release.sh
          gcloud run jobs execute kb-migrate --region=$REGION --wait

      - name: Deploy api
        run: gcloud run services update khanabazaar-api --region=$REGION --image=$API_IMAGE

      - name: Deploy web (runtime INTERNAL_API_URL too)
        run: |
          gcloud run services update khanabazaar-web --region=$REGION --image=$WEB_IMAGE \
            --update-env-vars=INTERNAL_API_URL="${{ vars.INTERNAL_API_URL }}"

      # Push firebase.json to the custom domain (khanabazaar.rishimule.dev). The
      # Hosting rewrite auto-tracks the latest khanabazaar-web revision, so this
      # is only strictly required when firebase.json changes — but running it
      # every deploy keeps the CDN config in sync and purges the Hosting CDN
      # cache, which is the backstop against stale-HTML ChunkLoadErrors (the
      # cache-control split lives in firebase.json). Auth: firebase-tools reads
      # the ADC that google-github-actions/auth@v3 exported (no SA key needed);
      # gh-deployer holds roles/firebasehosting.admin + roles/firebase.viewer.
      - name: Deploy Firebase Hosting (custom domain)
        run: npx --yes firebase-tools@13 deploy --only hosting --project "$PROJECT_ID" --non-interactive

      - name: Deploy worker on VM
        run: |
          gcloud compute ssh kb-svc --zone=$ZONE --tunnel-through-iap --quiet \
            --command='cd /opt/kb && sudo docker compose pull worker && sudo docker compose up -d worker && sudo docker image prune -af'

      # Reclaim the VM root disk: every deploy pulls fresh api/web images to the
      # VM and old ones accumulate. Left unchecked, / hits 100% and Redis can no
      # longer write its AOF ("MISCONF ... No space left on device") — breaking
      # search rate-limiting, OTP login, and cart sync. Pruning unused images
      # after the new worker is live keeps the disk healthy. The prune is part of
      # the SSH command above (runs once `up -d worker` has the new image active).
